x-db-env: &db-env
  DATABASE_URL: postgresql://sentinel:sentinel@postgres:5432/sentinel

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: sentinel
      POSTGRES_USER: sentinel
      POSTGRES_PASSWORD: sentinel
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sentinel -d sentinel"]
      interval: 5s
      timeout: 5s
      retries: 10

  migrate:
    image: postgres:16-alpine
    environment:
      <<: *db-env
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./db/migrations:/migrations:ro
    command: >
      sh -c 'psql $$DATABASE_URL -f /migrations/0001_init.sql'
    restart: "no"

  seed:
    image: postgres:16-alpine
    environment:
      <<: *db-env
    depends_on:
      migrate:
        condition: service_completed_successfully
    volumes:
      - ./db/seed:/seed:ro
    command: >
      sh -c 'psql $$DATABASE_URL -f /seed/seed.sql'
    restart: "no"

  dashboard:
    build:
      context: ./apps/dashboard
    environment:
      <<: *db-env
      SHIELD_DATABASE_URL: postgresql://sentinel:sentinel@postgres:5432/sentinel
      NODE_ENV: production
    depends_on:
      seed:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
    ports:
      - "3000:3000"
    restart: unless-stopped

volumes:
  pgdata:
