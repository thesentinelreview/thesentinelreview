name: Sentinel — Weapon-type Dry-run

# PR 1 verification gate: re-runs the live extractor on recent posts per theater
# and prints the weapon_type distribution + sample classifications (paste-ready
# markdown for the PR description). Read-only — issues SELECTs + LLM calls but
# never writes to the database, so it needs no schema change. Manual trigger only.

on:
  workflow_dispatch:
    inputs:
      sample_per_theater:
        description: 'Most-recent posts sampled per theater (default 50)'
        required: false
        default: '50'
      rate_limit:
        description: 'Max extract calls per second (default 4)'
        required: false
        default: '4'

jobs:
  dryrun:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install \
            "psycopg[binary]>=3.2" \
            "psycopg-pool>=3.2" \
            "httpx>=0.27" \
            "anthropic>=0.40" \
            "pydantic>=2.9" \
            "pydantic-settings>=2.5" \
            "structlog>=24.4" \
            "tenacity>=9.0"
          pip install --no-deps -e apps/ingest

      - name: Run weapon-type dry-run
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_MODEL_EXTRACT: claude-sonnet-4-6
          SENTINEL_DRYRUN_SAMPLE: ${{ github.event.inputs.sample_per_theater }}
          SENTINEL_DRYRUN_RATE_LIMIT: ${{ github.event.inputs.rate_limit }}
          PYTHONUNBUFFERED: '1'
        run: sentinel-run-weapon-type-dryrun
