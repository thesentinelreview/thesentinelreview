name: Publish White Paper PDF to main

on:
  workflow_dispatch:
    inputs:
      source_branch:
        description: 'Branch containing the PDF file to publish'
        required: true
        type: string

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout main
        uses: actions/checkout@v5
        with:
          ref: main
          fetch-depth: 0

      - name: Copy PDF from source branch
        run: |
          git fetch origin "${{ inputs.source_branch }}"
          git checkout "origin/${{ inputs.source_branch }}" -- sentinel-intel-dashboard-whitepaper.pdf

      - name: Commit and push PDF
        run: |
          git config user.name "Sentinel Bot"
          git config user.email "bot@sentinelreview.noreply"
          git add sentinel-intel-dashboard-whitepaper.pdf
          if git diff --staged --quiet; then
            echo "PDF already up to date."
          else
            git commit -m "Publish white paper PDF to main"
            git push
          fi
