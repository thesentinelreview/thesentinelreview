name: Sentinel — Data Integrity Checks

on:
  schedule:
    - cron: '15 */2 * * *'  # every 2 hours at :15 past (independent of ingest)
  workflow_dispatch:

jobs:
  integrity:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install \
            "psycopg[binary]>=3.2" \
            "psycopg-pool>=3.2" \
            "httpx>=0.27" \
            "pydantic>=2.9" \
            "pydantic-settings>=2.5" \
            "structlog>=24.4"
          pip install --no-deps -e apps/ingest

      - name: Verify DB target
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          EXPECTED_DB_HOST_SUBSTRING: ${{ vars.EXPECTED_DB_HOST_SUBSTRING }}
        run: sentinel-preflight

      - name: Run integrity checks
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          # Optional; set in repo secrets to receive Slack alerts on critical failures.
          SENTINEL_ALERT_WEBHOOK_URL: ${{ secrets.SENTINEL_ALERT_WEBHOOK_URL }}
          PYTHONUNBUFFERED: '1'
        run: sentinel-run-checks

  notify-failure:
    needs: [integrity]
    if: failure()
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Open failure issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          BODY="**Workflow:** Sentinel — Data Integrity Checks
          **Run:** ${RUN_URL}
          **Time:** $(date -u '+%Y-%m-%d %H:%M UTC')

          Fetch the run logs at the link above, identify the failing step, and push a fix."
          gh issue create \
            --repo "$REPO" \
            --title "pipeline failure: Sentinel — Data Integrity Checks ($(date -u '+%Y-%m-%d %H:%M UTC'))" \
            --body "$BODY"
