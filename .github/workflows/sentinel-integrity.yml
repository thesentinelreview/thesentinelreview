name: Sentinel — Data Integrity Checks

on:
  schedule:
    - cron: '15 */2 * * *'  # every 2 hours at :15 past (independent of ingest)
  workflow_dispatch:

jobs:
  integrity:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install \
            "psycopg[binary]>=3.2" \
            "psycopg-pool>=3.2" \
            "httpx>=0.27" \
            "pydantic>=2.9" \
            "pydantic-settings>=2.5" \
            "structlog>=24.4"
          pip install --no-deps -e apps/ingest

      - name: Run integrity checks
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SENTINEL_ALERT_WEBHOOK_URL: ${{ secrets.SENTINEL_ALERT_WEBHOOK_URL }}
          PYTHONUNBUFFERED: '1'
        run: sentinel-run-checks
