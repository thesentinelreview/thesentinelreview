name: Sentinel — Ingest Sources

on:
  schedule:
    - cron: '*/30 * * * *'  # every 30 minutes
  workflow_dispatch:

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install \
            "psycopg[binary]>=3.2" \
            "psycopg-pool>=3.2" \
            "httpx>=0.27" \
            "feedparser>=6.0" \
            "anthropic>=0.40" \
            "pydantic>=2.9" \
            "pydantic-settings>=2.5" \
            "structlog>=24.4" \
            "tenacity>=9.0"
          pip install --no-deps -e apps/ingest

      - name: Apply pending migrations
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python packages/db/migrate.py

      - name: Run ingest
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_MODEL_EXTRACT: claude-sonnet-4-6
          PYTHONUNBUFFERED: '1'
        run: sentinel-run-ingest

      - name: Run integrity checks
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SENTINEL_ALERT_WEBHOOK_URL: ${{ secrets.SENTINEL_ALERT_WEBHOOK_URL }}
          PYTHONUNBUFFERED: '1'
        run: sentinel-run-checks

  notify-failure:
    needs: [ingest]
    if: failure()
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Open failure issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          BODY="**Workflow:** Sentinel — Ingest Sources
          **Run:** ${RUN_URL}
          **Time:** $(date -u '+%Y-%m-%d %H:%M UTC')

          Fetch the run logs at the link above, identify the failing step, and push a fix."
          gh issue create \
            --repo "$REPO" \
            --title "pipeline failure: Sentinel — Ingest Sources ($(date -u '+%Y-%m-%d %H:%M UTC'))" \
            --body "$BODY"
