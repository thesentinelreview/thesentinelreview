name: Sentinel — Ingest Sources

on:
  schedule:
    - cron: '*/30 * * * *'  # every 30 minutes
  workflow_dispatch:

# A cadence-watchdog dispatch that overlaps a late-firing cron run must QUEUE,
# never double-run (overlapping runs would race the "Apply pending migrations"
# step) and never cancel an in-flight ingest.
concurrency:
  group: sentinel-ingest
  cancel-in-progress: false

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install \
            "psycopg[binary]>=3.2" \
            "psycopg-pool>=3.2" \
            "httpx>=0.27" \
            "feedparser>=6.0" \
            "anthropic>=0.40" \
            "pydantic>=2.9" \
            "pydantic-settings>=2.5" \
            "structlog>=24.4" \
            "tenacity>=9.0" \
            "atproto>=0.0.51" \
            "telethon>=1.36"
          pip install --no-deps -e apps/ingest

      - name: Verify DB target
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          EXPECTED_DB_HOST_SUBSTRING: ${{ vars.EXPECTED_DB_HOST_SUBSTRING }}
        run: sentinel-preflight

      - name: Apply pending migrations
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python packages/db/migrate.py

      - name: Run ingest
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_MODEL_EXTRACT: claude-sonnet-4-6
          BLUESKY_HANDLE: ${{ secrets.BLUESKY_HANDLE }}
          BLUESKY_APP_PASSWORD: ${{ secrets.BLUESKY_APP_PASSWORD }}
          TELEGRAM_API_ID: ${{ secrets.TELEGRAM_API_ID }}
          TELEGRAM_API_HASH: ${{ secrets.TELEGRAM_API_HASH }}
          TELEGRAM_SESSION: ${{ secrets.TELEGRAM_SESSION }}
          X_BEARER_TOKEN: ${{ secrets.X_BEARER_TOKEN }}
          # Repo variable; unset → strict (exit non-zero on a zero-write run).
          # Set repository variable SENTINEL_STRICT_MODE=false to disable.
          SENTINEL_STRICT_MODE: ${{ vars.SENTINEL_STRICT_MODE }}
          PYTHONUNBUFFERED: '1'
        run: sentinel-run-ingest

      - name: Run integrity checks
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          # Optional; set in repo secrets to receive Slack alerts on critical failures.
          SENTINEL_ALERT_WEBHOOK_URL: ${{ secrets.SENTINEL_ALERT_WEBHOOK_URL }}
          PYTHONUNBUFFERED: '1'
        run: sentinel-run-checks

      - name: Record ingest heartbeat
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          # Watchdog beat (migration 0034): the in-DB sentinel-watchdog pg_cron
          # job files a GitHub issue if these beats stop for 75+ minutes —
          # detection of GitHub-scheduler silences that doesn't live on
          # GitHub's scheduler. Last step on purpose: a beat means the whole
          # tick worked (a failed run pages via notify-failure instead). The
          # table is guaranteed here: "Apply pending migrations" above ran
          # 0034 before this step on the very first post-merge tick.
          python3 - <<'EOF'
          import os, psycopg
          with psycopg.connect(os.environ["DATABASE_URL"]) as conn:
              conn.execute(
                  "INSERT INTO pipeline_heartbeats (kind, beat_at) "
                  "VALUES ('ingest', now()) "
                  "ON CONFLICT (kind) DO UPDATE SET beat_at = now()"
              )
          print("ingest heartbeat recorded")
          EOF

  notify-failure:
    needs: [ingest]
    if: failure()
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Open failure issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          BODY="**Workflow:** Sentinel — Ingest Sources
          **Run:** ${RUN_URL}
          **Time:** $(date -u '+%Y-%m-%d %H:%M UTC')

          Fetch the run logs at the link above, identify the failing step, and push a fix."
          gh issue create \
            --repo "$REPO" \
            --title "pipeline failure: Sentinel — Ingest Sources ($(date -u '+%Y-%m-%d %H:%M UTC'))" \
            --body "$BODY"
