name: Aggregate News

on:
  schedule:
    - cron: '5 */8 * * *'
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'aggregate.py'
      - 'template.html'
      - 'post_to_x.py'

jobs:
  aggregate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run aggregator
        run: python aggregate.py

      - name: Post to X
        env:
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
          X_BEARER_TOKEN: ${{ secrets.X_BEARER_TOKEN }}
        run: python post_to_x.py
        continue-on-error: true

      - name: Commit updated files
        run: |
          git config user.name "Sentinel Bot"
          git config user.email "bot@sentinelreview.noreply"
          git add index.html feed.xml
          if [ -f posted_state.json ]; then
            git add posted_state.json
          fi
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Auto-update: $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
          fi
