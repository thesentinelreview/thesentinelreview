name: Sentinel — Daily Briefing

on:
  schedule:
    - cron: '0 12 * * *'  # daily at 12:00 UTC (noon — after morning ingest)
    - cron: '0 20 * * *'  # daily at 20:00 UTC (evening — full day coverage)
  workflow_dispatch:

jobs:
  briefing:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install \
            "psycopg[binary]>=3.2" \
            "psycopg-pool>=3.2" \
            "httpx>=0.27" \
            "feedparser>=6.0" \
            "anthropic>=0.40" \
            "pydantic>=2.9" \
            "pydantic-settings>=2.5" \
            "structlog>=24.4" \
            "tenacity>=9.0"
          pip install --no-deps -e apps/ingest

      - name: Verify DB target
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          EXPECTED_DB_HOST_SUBSTRING: ${{ vars.EXPECTED_DB_HOST_SUBSTRING }}
        run: sentinel-preflight

      - name: Generate briefing
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_MODEL_EXTRACT: claude-sonnet-4-6
          ANTHROPIC_MODEL_BRIEFING: claude-opus-4-7
          PYTHONUNBUFFERED: '1'
        run: sentinel-run-briefing
