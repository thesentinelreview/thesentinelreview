name: Sentinel — API v1 Smoke Transcript

# One-click live-curl transcript for the Read API (W2-1 closure evidence and
# future regression smoke). Reads the key from the API_SMOKE_KEY repo secret —
# the key value is never printed; GitHub masks the secret in logs and the
# script only prints statuses, rate headers, and truncated bodies.
#
# Operator steps: create a key at /account → save it as the API_SMOKE_KEY
# repo secret → Actions → run this workflow.

on:
  workflow_dispatch:

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Run transcript
        env:
          API_KEY: ${{ secrets.API_SMOKE_KEY }}
          BASE: https://dashboard.thesentinelreview.com/api/v1
        run: |
          set -euo pipefail
          [ -n "$API_KEY" ] || { echo "API_SMOKE_KEY secret is not set"; exit 1; }

          call () { # call <label> <path-and-query>
            echo "=================================================================="
            echo "GET /api/v1$2"
            curl -sS -D /tmp/h -o /tmp/b -H "Authorization: Bearer $API_KEY" "$BASE$2"
            echo "-- status + rate headers --"
            head -1 /tmp/h
            grep -i '^x-ratelimit' /tmp/h || true
            echo "-- body (first 900 chars) --"
            head -c 900 /tmp/b; echo; echo
          }

          SINCE="$(date -u -d '14 days ago' +%Y-%m-%dT00:00:00Z)"
          UNTIL="$(date -u +%Y-%m-%dT%H:%M:%SZ)"

          call events "/events?theater=ukraine&limit=3"
          EVENT_ID=$(curl -sS -H "Authorization: Bearer $API_KEY" "$BASE/events?limit=1" | jq -r '.events[0].id // empty')
          if [ -n "$EVENT_ID" ]; then call event-detail "/events/$EVENT_ID"; else echo "no events available for detail call"; fi
          call briefings "/briefings?limit=3"
          BRIEFING_ID=$(curl -sS -H "Authorization: Bearer $API_KEY" "$BASE/briefings?limit=1" | jq -r '.briefings[0].id // empty')
          if [ -n "$BRIEFING_ID" ]; then call briefing-detail "/briefings/$BRIEFING_ID"; else echo "no briefings available for detail call"; fi
          call sources "/sources"
          call intensity "/analytics/intensity?since=$SINCE&until=$UNTIL"
          call counts "/analytics/counts?since=$SINCE&until=$UNTIL&group_by=event_type"
          call source-stats "/analytics/source-stats?since=$SINCE&until=$UNTIL"

          echo "=================================================================="
          echo "negative case: 422 invalid_parameter (limit=999) with rate headers"
          curl -sS -D /tmp/h -o /tmp/b -H "Authorization: Bearer $API_KEY" "$BASE/events?limit=999" || true
          head -1 /tmp/h; grep -i '^x-ratelimit' /tmp/h || true; cat /tmp/b; echo

          echo "=================================================================="
          echo "negative case: 401 invalid_key (no credentials)"
          curl -sS -D /tmp/h -o /tmp/b "$BASE/events" || true
          head -1 /tmp/h; cat /tmp/b; echo
