name: Daily Briefing

on:
  schedule:
    # 03:00 UTC = 11:00 PM ET (EDT) / 10:00 PM ET (EST) — runs the night before delivery.
    # Generation timing isn't sensitive: GitHub Actions cron lag of even 2-3 hours
    # is harmless because the briefing is created with a scheduled publish_date.
    # Buttondown's scheduler delivers the email at the exact target time (5:23 AM EDT).
    - cron: '0 3 * * *'
  workflow_dispatch:  # allow manual triggering

jobs:
  send-briefing:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Send briefing
        env:
          BUTTONDOWN_API_KEY: ${{ secrets.BUTTONDOWN_API_KEY }}
          # "schedule" = create email with future publish_date, Buttondown delivers precisely
          # "send"     = send immediately upon creation
          # "draft"    = save as draft for manual review
          BRIEFING_MODE: schedule
        run: python generate_briefing.py
