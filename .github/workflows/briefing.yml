name: Daily Briefing

on:
  schedule:
# 09:23 UTC fires at 5:23 AM EDT (summer) / 4:23 AM EST (winter)
    # Off-peak minute and hour to minimize GitHub Actions cron lag
    # Targets "before 7 AM ET" delivery year-round with buffer for delays
    - cron: '23 9 * * *'
  workflow_dispatch:  # allow manual triggering

jobs:
  send-briefing:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Send briefing
        env:
          BUTTONDOWN_API_KEY: ${{ secrets.BUTTONDOWN_API_KEY }}
          BRIEFING_MODE: send  # change to "draft" to test without sending
        run: python generate_briefing.py
