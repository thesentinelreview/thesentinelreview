name: Daily Briefing

on:
  schedule:
    # 01:00 UTC = 9:00 PM ET (EDT) / 8:00 PM ET (EST) — runs the night before delivery.
    # Moved earlier (was 03:00 UTC) to give an 8+ hour buffer before the 09:23 UTC
    # delivery target. Combined with the lag-handling fallback in generate_briefing.py
    # (which schedules ASAP if we somehow miss the window anyway), this makes
    # delivery resilient to multi-hour GitHub Actions cron lag.
    - cron: '0 1 * * *'
  workflow_dispatch:  # allow manual triggering

jobs:
  send-briefing:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Send briefing
        env:
          BUTTONDOWN_API_KEY: ${{ secrets.BUTTONDOWN_API_KEY }}
          # "schedule" = create email with future publish_date, Buttondown delivers precisely
          # "send"     = send immediately upon creation
          # "draft"    = save as draft for manual review
          BRIEFING_MODE: schedule
        run: python generate_briefing.py
