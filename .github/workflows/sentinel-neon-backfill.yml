name: sentinel-neon-backfill

# One-shot, manual-only. Copies orphaned raw_posts from the frozen pre-migration
# Neon project (ROGUE_NEON_URL) into the live Supabase database (DATABASE_URL).
#
# Dry-run by default: prints the would-insert count and writes nothing. Re-run
# with apply=true to commit. Idempotent — INSERT ... ON CONFLICT
# (source_id, external_id) DO NOTHING — so an accidental re-run inserts 0.
# Run from the Actions tab -> "sentinel-neon-backfill" -> "Run workflow".

on:
  workflow_dispatch:
    inputs:
      apply:
        description: 'Write to Supabase. Leave unchecked for a dry run (prints the would-insert count).'
        type: boolean
        required: false
        default: false

jobs:
  backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install "psycopg[binary]>=3.1"

      - name: Run backfill
        env:
          NEON_URL: ${{ secrets.ROGUE_NEON_URL }}
          SUPABASE_URL: ${{ secrets.DATABASE_URL }}
          APPLY: ${{ github.event.inputs.apply }}
          PYTHONUNBUFFERED: "1"
        run: python backfill_neon_to_supabase.py
